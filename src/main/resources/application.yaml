spring:
  application:
    name: sbatch-partitioner-score-update
  datasource:
    jdbcUrl: jdbc:mysql://localhost:3306/sbatch_execution
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  batch:
    jdbc:
      initialize-schema: always

app:
  datasource:
    jdbcUrl: jdbc:mysql://localhost:3306/dbUserScore?rewriteBatchedStatements=true
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      minimum-idle: 8
      maximum-pool-size: 12
  batch:
    chunk-size: 5000
    thread-usage: 8